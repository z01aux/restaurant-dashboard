<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo_marys.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    
    <!-- ============================================ -->
    <!-- THEME COLOR PARA NAVEGADORES MÓVILES        -->
    <!-- ============================================ -->
    
    <!-- Para Android / Chrome / Edge / Firefox móvil -->
    <meta name="theme-color" content="#dc2626" />
    
    <!-- Para navegadores Windows Phone -->
    <meta name="msapplication-navbutton-color" content="#dc2626" />
    
    <!-- Para PWA (Android y iOS moderno) - Versión actualizada -->
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- Para iOS Safari (cuando se instala como PWA) - Mantener por compatibilidad -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Mary's" />
    
    <!-- ============================================ -->
    <!-- META TAGS ADICIONALES                       -->
    <!-- ============================================ -->
    
    <!-- Descripción para SEO -->
    <meta name="description" content="Sistema de gestión para Mary's Restaurant - Administración de pedidos, menú, facturación y más." />
    <meta name="keywords" content="restaurante, pedidos, facturación, menú, Mary's Restaurant" />
    <meta name="author" content="JozzyMat" />
    
    <!-- Open Graph para redes sociales -->
    <meta property="og:title" content="Mary's Restaurant" />
    <meta property="og:description" content="Sistema de gestión para Mary's Restaurant" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/logo_marys.png" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Mary's Restaurant" />
    <meta name="twitter:description" content="Sistema de gestión para Mary's Restaurant" />
    <meta name="twitter:image" content="/logo_marys.png" />
    
    <title>MARY'S RESTAURANT</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
